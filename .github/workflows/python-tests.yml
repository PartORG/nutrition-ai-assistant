name: Python Unit Tests Runner

on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - "**"

jobs:
  test:
    name: Run unit tests (src/)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install test dependencies
        run: |
          pip install --upgrade pip
          pip install pytest pytest-asyncio pytest-cov

      - name: Install project dependencies (lightweight subset)
        run: |
          pip install \
            "fastapi>=0.109.0" \
            "pydantic>=2.7.4,<3.0.0" \
            "python-jose[cryptography]>=3.3.0" \
            "bcrypt>=3.2.0,<4.0.0" \
            "aiosqlite>=0.19.0" \
            "python-dotenv>=1.0.0"

      - name: Run tests
        # pytest.ini provides: asyncio_mode=auto, testpaths=tests,
        # pythonpath=src, addopts=--import-mode=importlib
        # tests/conftest.py also inserts src/ into sys.path explicitly.
        run: |
          pytest \
            --tb=short \
            -q \
            --cov=src \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 7
